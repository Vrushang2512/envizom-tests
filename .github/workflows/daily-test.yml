name: Envizom Daily Tests

on:
  schedule:
    # 8:00 AM IST = 02:30 UTC
    - cron: '30 2 * * *'
    # 12:00 AM IST (midnight) = 18:30 UTC (previous day)
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  test-worker-1:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        env:
          ENVIZOM_EMAIL: ${{ secrets.ENVIZOM_EMAIL }}
          ENVIZOM_PASSWORD: ${{ secrets.ENVIZOM_PASSWORD }}
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: npx playwright test tests/01-overview.spec.ts tests/02-dashboard.spec.ts tests/03-cluster.spec.ts tests/04-reports.spec.ts tests/05a-analytics.spec.ts tests/05b-analytics.spec.ts tests/06-display.spec.ts tests/07-alerts.spec.ts --reporter=html

      - name: Upload video recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Send Google Chat notification (Pass)
        if: success()
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          RUN_TIME=$(date '+%Y-%m-%d %H:%M UTC')
          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "${GCHAT_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"✅ Envizom Daily Tests — PASSED\\n🕐 Run Time: ${RUN_TIME}\\n📊 Report: ${REPORT_URL}\"}"

      - name: Send Google Chat notification (Fail)
        if: failure()
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          RUN_TIME=$(date '+%Y-%m-%d %H:%M UTC')
          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "${GCHAT_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"❌ Envizom Daily Tests — FAILED\\n🕐 Run Time: ${RUN_TIME}\\n📊 Report: ${REPORT_URL}\\n⚠️ Please check for failed tests.\"}"
