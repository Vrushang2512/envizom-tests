name: Envizom Daily Tests - Worker 2

on:
  workflow_run:
    workflows: ["Envizom Daily Tests"]
    types: [completed]
  workflow_dispatch:

jobs:
  test-worker-2:
    name: "Worker 2 - Tests 08-15"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - name: Start virtual display (Xvfb)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run Worker 2 Tests
        env:
          ENVIZOM_EMAIL: ${{ secrets.ENVIZOM_EMAIL }}
          ENVIZOM_PASSWORD: ${{ secrets.ENVIZOM_PASSWORD }}
        run: npx playwright test tests/08-heatmap.spec.ts tests/09-complain.spec.ts tests/10-data-validation.spec.ts tests/11-data-upload.spec.ts tests/12-projects.spec.ts tests/13-devices.spec.ts tests/14-user.spec.ts tests/api/ --reporter=html
      - name: Upload Worker 2 Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-worker2-${{ github.run_id }}
          path: test-results/
          retention-days: 7
      - name: Upload Worker 2 Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-worker2-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7
      - name: Notify Pass
        if: success()
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          RUN_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          VIDEO_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          curl -s -X POST "${GCHAT_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"✅ Envizom Daily Tests Worker 2 — PASSED\\n🕐 Run Time: ${RUN_TIME}\\n📊 Report: ${REPORT_URL}\\n🎬 Videos: ${VIDEO_URL}\"}"
      - name: Notify Fail
        if: failure()
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          RUN_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          VIDEO_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          curl -s -X POST "${GCHAT_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"❌ Envizom Daily Tests Worker 2 — FAILED\\n🕐 Run Time: ${RUN_TIME}\\n📊 Report: ${REPORT_URL}\\n🎬 Videos: ${VIDEO_URL}\\n⚠️ Please check for failed tests.\"}"
