name: Envizom Daily Tests

on:
  schedule:
    - cron: '30 2 * * *'
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  test-worker-1:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        id: run_tests
        continue-on-error: true
        env:
          ENVIZOM_EMAIL: ${{ secrets.ENVIZOM_EMAIL }}
          ENVIZOM_PASSWORD: ${{ secrets.ENVIZOM_PASSWORD }}
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          npx playwright test tests/01-overview.spec.ts tests/02-dashboard.spec.ts tests/03-cluster.spec.ts tests/04-reports.spec.ts tests/05a-analytics.spec.ts tests/05b-analytics.spec.ts tests/06-display.spec.ts tests/07-alerts.spec.ts --reporter=html,json 2>&1 | tee test-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload video recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Parse failed tests and notify
        if: always()
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          RUN_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          VIDEO_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
          FAILED_TESTS=""
          if [ -f "results.json" ]; then
            FAILED_TESTS=$(node -e "const r=require('./results.json');const f=[];(r.suites||[]).forEach(s=>{(s.suites||[]).forEach(ss=>{(ss.specs||[]).forEach(sp=>{if(sp.tests&&sp.tests.some(t=>t.results&&t.results.some(r=>r.status==='failed'))){f.push(ss.title+' > '+sp.title)}})})});console.log(f.join('\n'));" 2>/dev/null || echo "")
          fi
          if grep -q "failed" test-output.log 2>/dev/null; then
            TOTAL=$(grep -oE "[0-9]+ failed, [0-9]+ passed" test-output.log | tail -1 || grep -oE "[0-9]+ failed" test-output.log | tail -1 || echo "Tests failed")
            if [ -n "$FAILED_TESTS" ]; then
              BODY="Failed: ${TOTAL}. Failed tests: ${FAILED_TESTS}"
            else
              BODY="Failed: ${TOTAL}"
            fi
            MSG="FAILED - Envizom Daily Tests | ${RUN_TIME} | ${BODY} | Report: ${REPORT_URL}"
          else
            TOTAL=$(grep -oE "[0-9]+ passed" test-output.log | tail -1 || echo "All passed")
            MSG="PASSED - Envizom Daily Tests | ${RUN_TIME} | ${TOTAL} | Report: ${REPORT_URL}"
          fi
          curl -s -X POST "${GCHAT_WEBHOOK_URL}" -H "Content-Type: application/json" -d "{\"text\": \"$MSG\"}"

      - name: Fail job if tests failed
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1
