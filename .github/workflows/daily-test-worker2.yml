name: Envizom Daily Tests - Worker 2

on:
  workflow_run:
      workflows: ["Envizom Daily Tests"]
          types: [completed]
            workflow_dispatch:

            jobs:
              test-worker-2:
                  name: "Worker 2 - Tests 08-15"
                      runs-on: ubuntu-latest
                          timeout-minutes: 45
                              steps:
                                    - uses: actions/checkout@v4
                                          - uses: actions/setup-node@v4
                                                  with:
                                                            node-version: '20'
                                                                  - run: npm install
                                                                        - run: npx playwright install --with-deps chromium

                                                                              - name: Run Worker 2 Tests
                                                                                      id: run_tests
                                                                                              continue-on-error: true
                                                                                                      env:
                                                                                                                ENVIZOM_EMAIL: ${{ secrets.ENVIZOM_EMAIL }}
                                                                                                                          ENVIZOM_PASSWORD: ${{ secrets.ENVIZOM_PASSWORD }}
                                                                                                                                  run: |
                                                                                                                                            npx playwright test tests/08-heatmap.spec.ts tests/09-complain.spec.ts tests/10-data-validation.spec.ts tests/11-data-upload.spec.ts tests/12-projects.spec.ts tests/13-devices.spec.ts tests/14-user.spec.ts tests/api/ --reporter=html,json 2>&1 | tee test-output.log
                                                                                                                                                      echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
                                                                                                                                                      
                                                                                                                                                            - name: Upload Worker 2 Videos
                                                                                                                                                                    if: always()
                                                                                                                                                                            uses: actions/upload-artifact@v4
                                                                                                                                                                                    with:
                                                                                                                                                                                              name: videos-worker2-${{ github.run_id }}
                                                                                                                                                                                                        path: test-results/
                                                                                                                                                                                                                  retention-days: 7
                                                                                                                                                                                                                  
                                                                                                                                                                                                                        - name: Upload Worker 2 Report
                                                                                                                                                                                                                                if: always()
                                                                                                                                                                                                                                        uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                          name: report-worker2-${{ github.run_id }}
                                                                                                                                                                                                                                                                    path: playwright-report/
                                                                                                                                                                                                                                                                              retention-days: 7
                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                    - name: Parse failed tests and notify
                                                                                                                                                                                                                                                                                            if: always()
                                                                                                                                                                                                                                                                                                    env:
                                                                                                                                                                                                                                                                                                              GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                RUN_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
                                                                                                                                                                                                                                                                                                                                          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                                                                                                                                                                                                                                                                                                                                    VIDEO_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts"
                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                              # Parse failed test names from JSON report
                                                                                                                                                                                                                                                                                                                                                                        FAILED_TESTS=""
                                                                                                                                                                                                                                                                                                                                                                                  if [ -f "results.json" ]; then
                                                                                                                                                                                                                                                                                                                                                                                              FAILED_TESTS=$(node -e "
                                                                                                                                                                                                                                                                                                                                                                                                            const r = require('./results.json');
                                                                                                                                                                                                                                                                                                                                                                                                                          const failed = [];
                                                                                                                                                                                                                                                                                                                                                                                                                                        (r.suites || []).forEach(suite => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                        (suite.suites || []).forEach(s => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          (s.specs || []).forEach(spec => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              if (spec.tests && spec.tests.some(t => t.results && t.results.some(r => r.status === 'failed'))) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    failed.push('❌ ' + s.title + ' › ' + spec.title);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      console.log(failed.length > 0 ? failed.join('\n') : '');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  " 2>/dev/null || echo "")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      # Determine overall status from exit code in log
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if grep -q "failed" test-output.log 2>/dev/null; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            TOTAL_LINE=$(grep -E "^[0-9]+ (passed|failed)" test-output.log | tail -1 || echo "")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if [ -n "$FAILED_TESTS" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      FAILED_SECTION="\n\n⚠️ Failed Tests:\n${FAILED_TESTS}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                FAILED_SECTION="\n\n⚠️ Some tests failed. Check report for details."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        MESSAGE="❌ Envizom Worker 2 — FAILED\n🕐 ${RUN_TIME}\n📊 ${TOTAL_LINE}\n${FAILED_SECTION}\n\n📋 Report: ${REPORT_URL}\n🎬 Videos: ${VIDEO_URL}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  else
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              TOTAL_LINE=$(grep -E "passed" test-output.log | tail -1 || echo "All tests passed")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          MESSAGE="✅ Envizom Worker 2 — PASSED\n🕐 ${RUN_TIME}\n📊 ${TOTAL_LINE}\n\n📋 Report: ${REPORT_URL}\n🎬 Videos: ${VIDEO_URL}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    fi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              curl -s -X POST "${GCHAT_WEBHOOK_URL}" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          -H 'Content-Type: application/json' \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      -d "{\"text\": \"${MESSAGE}\"}"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Fail job if tests failed
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if: steps.run_tests.outputs.exit_code != '0'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: exit 1
