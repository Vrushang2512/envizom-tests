name: Envizom Daily Tests - Worker 2

on:
  workflow_run:
    workflows: ["Envizom Daily Tests"]
    types: [completed]
  workflow_dispatch:

jobs:
  test-worker-2:
    name: Worker 2 - Tests 08-15
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Worker 2 Tests
        id: run_tests
        continue-on-error: true
        env:
          ENVIZOM_EMAIL: ${{ secrets.ENVIZOM_EMAIL }}
          ENVIZOM_PASSWORD: ${{ secrets.ENVIZOM_PASSWORD }}
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: |
          set -o pipefail
          npx playwright test tests/08_heatmap.spec.ts tests/09_complain.spec.ts tests/10_datavalidation.spec.ts tests/11_dataupload.spec.ts tests/12_projects.spec.ts tests/13_devices.spec.ts tests/14_user.spec.ts tests/api/15_api.spec.ts --reporter=html,json 2>&1 | tee test-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos-worker2
          path: test-results/
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-worker2
          path: playwright-report/
          if-no-files-found: ignore

      - name: Build notification message
        if: always()
        id: build_msg
        env:
          EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
        run: |
          RUN_TIME=$(TZ="Asia/Kolkata" date "+%Y-%m-%d %H:%M IST")
          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          node -e "
          const fs = require('fs');
          if (!fs.existsSync('results.json')) { console.log('NO_RESULTS'); process.exit(0); }
          const r = JSON.parse(fs.readFileSync('results.json','utf8'));
          const failed = [];
          const passed = [];
          function walk(suites) {
            for (const s of (suites||[])) {
              walk(s.suites);
              for (const spec of (s.specs||[])) {
                for (const test of (spec.tests||[])) {
                  const lastResult = (test.results||[]).slice(-1)[0];
                  if (!lastResult) continue;
                  const title = spec.title;
                  if (lastResult.status==='passed') {
                    passed.push(title);
                  } else {
                    const err = (lastResult.error && lastResult.error.message)
                      ? lastResult.error.message.replace(/[\r\n]+/g,' ').substring(0,150)
                      : lastResult.status;
                    failed.push(title + ' :: ' + err);
                  }
                }
              }
            }
          }
          walk(r.suites);
          console.log('PASSED_COUNT=' + passed.length);
          console.log('FAILED_COUNT=' + failed.length);
          if (failed.length > 0) {
            console.log('FAILED_DETAILS=' + failed.join(' | '));
          }
          " >> $GITHUB_OUTPUT 2>/dev/null || true

          echo "RUN_TIME=$RUN_TIME" >> $GITHUB_OUTPUT
          echo "REPORT_URL=$REPORT_URL" >> $GITHUB_OUTPUT

      - name: Send GChat notification
        if: always()
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
          RUN_TIME: ${{ steps.build_msg.outputs.RUN_TIME }}
          REPORT_URL: ${{ steps.build_msg.outputs.REPORT_URL }}
          PASSED_COUNT: ${{ steps.build_msg.outputs.PASSED_COUNT }}
          FAILED_COUNT: ${{ steps.build_msg.outputs.FAILED_COUNT }}
          FAILED_DETAILS: ${{ steps.build_msg.outputs.FAILED_DETAILS }}
        run: |
          if [ "$EXIT_CODE" != "0" ]; then
            MSG="FAILED - Envizom Daily Tests (Worker 2) | ${RUN_TIME} | Passed: ${PASSED_COUNT} | Failed: ${FAILED_COUNT} | Failed Tests: ${FAILED_DETAILS} | Report: ${REPORT_URL}"
          else
            MSG="PASSED - Envizom Daily Tests (Worker 2) | ${RUN_TIME} | All ${PASSED_COUNT} tests passed | Report: ${REPORT_URL}"
          fi
          curl -s -X POST "$GCHAT_WEBHOOK_URL" -H "Content-Type: application/json" -d "{\"text\": \"$MSG\"}"

      - name: Send email on success
        if: steps.run_tests.outputs.exit_code == '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "PASSED - Envizom Daily Tests (Worker 2) - ${{ steps.build_msg.outputs.RUN_TIME }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: Envizom Tests <${{ secrets.SMTP_USER }}>
          body: |
            All Envizom Daily Tests (Worker 2) passed successfully.

            Time: ${{ steps.build_msg.outputs.RUN_TIME }}
            Tests Passed: ${{ steps.build_msg.outputs.PASSED_COUNT }}
            Report: ${{ steps.build_msg.outputs.REPORT_URL }}

      - name: Fail job if tests failed
        if: steps.run_tests.outputs.exit_code != '0'
        run: exit 1
